# ╔══════════════════════════════════════════════════════════════╗
# ║  SurfaceAlpha — Model Architecture Configuration            ║
# ║  All hyperparameters for the multimodal model               ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Surface Encoder (Vision Transformer) ──
# Input shape: (batch, C, H, W)
#   C = num_input_channels (6)
#   H = n_maturity_bins (12 from data.yaml)
#   W = n_moneyness_bins (20 from data.yaml)
surface_encoder:
  num_input_channels: 6           # iv, spread_norm, mask, staleness, delta, vega
  patch_size_h: 3                 # patch height (maturity dimension)
  patch_size_w: 4                 # patch width (moneyness dimension)
  embed_dim: 128                  # transformer embedding dimension
  num_heads: 4                    # multi-head self-attention heads
  num_layers: 2                   # number of transformer blocks
  mlp_ratio: 4.0                  # FFN hidden dim = embed_dim x mlp_ratio
  dropout: 0.2
  attn_dropout: 0.2
  pos_embed_type: learnable       # "learnable" or "sinusoidal"

# ── Returns Encoder (Temporal) ──
# Input shape: (batch, L, F_ret)
#   L = lookback_window (60 from data.yaml)
#   F_ret = input_dim (features per timestep)
returns_encoder:
  backbone: gru                   # "gru", "tcn", or "transformer"
  input_dim: 6                    # log_ret + rv_5 + rv_10 + rv_21 + jump + beta
  hidden_dim: 64
  num_layers: 2
  dropout: 0.2
  # TCN-specific settings
  tcn_kernel_size: 3
  tcn_num_channels: [64, 64, 64]
  # Transformer-specific settings
  transformer_heads: 4
  transformer_ffn_dim: 128

# ── Context Encoder (dual-stream vol-history + market state MLP) ──
# vol_history and market_state each get their own LayerNorm + MLP branch
# to prevent large vol_history features from drowning out macro signals.
context_encoder:
  vol_history_dim: 11             # number of vol-history features
  macro_dim: 6                    # vix + spy_return + risk_free_rate + spy_pct_from_ma200 + spy_adx14 + spy_atr_ratio
  vol_hidden_dim: 64              # hidden size for vol-history branch
  macro_hidden_dim: 16            # hidden size for macro branch
  output_dim: 32                  # final z_ctx dimension (after projection)
  dropout: 0.2

# ── Fusion ──
# Combines [z_surf, z_ret, z_ctx] into a single representation z
fusion:
  method: concat_mlp              # "concat_mlp" or "cross_attention"
  hidden_dim: 128
  dropout: 0.25

# ── Output Heads ──
output_heads:
  # Volatility regression head: z → scalar log(RV) forecast
  vol_head:
    hidden_dim: 64
    num_layers: 2

  # Tail-risk head: z → P(tail event)
  tail_head:
    hidden_dim: 32
    num_layers: 2

  # Regime classification head: z → softmax over K regimes
  regime_head:
    hidden_dim: 64
    num_layers: 2
    num_regimes: 6                # bull/bear/sideways x quiet/volatile

# ── Regime-Conditional Mixture of Experts ──
# Final prediction: y_hat = sum_k p_k * y_hat_k
regime_moe:
  num_experts: 6                  # one expert per regime
  expert_hidden_dim: 32
  expert_num_layers: 2
